name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test:
    name: Run Anchor Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: metadaoproject/anchor-test@v2.3
        with:
          anchor-version: "0.31.1"  # ← Changed from 0.30.0
          solana-cli-version: "2.3.12"  # ok (compatible with 0.31.1)
          node-version: "20"  # ok (20 LTS is stable)
