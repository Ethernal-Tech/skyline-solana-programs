name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
jobs:
  test:
    name: Run Anchor Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: metadaoproject/anchor-test@v2.3
        with:
          anchor-version: "0.30.0"
          solana-cli-version: "2.3.12"
          node-version: "20"
